<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyma BrewLab - Gestión de Pedidos y OT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- Header -->
        <header class="border-b border-slate-800 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-amber-500">🍺 Chuyma BrewLab</h1>
                <p class="text-xs text-slate-400">Generación de Orden de Trabajo (OT) y Trazabilidad</p>
            </div>
            <span class="bg-amber-500/10 text-amber-400 text-xs px-3 py-1 rounded-full border border-amber-500/20">Módulo OT</span>
        </header>

        <!-- Formulario Principal -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl space-y-6">
            
            <!-- Sección 1: Cliente y Despacho -->
            <div>
                <h2 class="text-sm font-semibold text-amber-400 uppercase tracking-wider mb-4">1. Datos del Cliente y Despacho</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Nombre / Razón Social *</label>
                        <input type="text" id="cliente" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm focus:border-amber-500 focus:outline-none" placeholder="Ej: Bar Central">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">RUT Cliente *</label>
                        <input type="text" id="rutCliente" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm focus:border-amber-500 focus:outline-none" placeholder="Ej: 77.123.456-7">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Dirección de Despacho *</label>
                        <input type="text" id="direccionDespacho" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm focus:border-amber-500 focus:outline-none" placeholder="Ej: Av. Providencia 1234">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Forma de Pago *</label>
                        <select id="formaPago" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm focus:border-amber-500 focus:outline-none">
                            <option value="Transferencia">Transferencia Electrónica</option>
                            <option value="Efectivo">Efectivo</option>
                            <option value="Credito30">Crédito 30 días</option>
                        </select>
                    </div>
                </div>
            </div>

            <hr class="border-slate-800">

            <!-- Sección 2: Selección de Producto y FIFO -->
            <div>
                <h2 class="text-sm font-semibold text-amber-400 uppercase tracking-wider mb-4">2. Selección de Cerveza (Cava)</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-xs text-slate-400 mb-1">Seleccionar Lote / Cerveza Disponible *</label>
                        <select id="selectCava" onchange="actualizarDetallesLote()" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm focus:border-amber-500 focus:outline-none">
                            <option value="">Cargando cava...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Cantidad a Despachar *</label>
                        <input type="number" id="cantidad" oninput="calcularTotal()" min="1" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm focus:border-amber-500 focus:outline-none" placeholder="0">
                    </div>
                </div>

                <!-- Banner Alerta FIFO -->
                <div id="alertaFIFO" class="hidden mt-3 p-3 rounded-lg text-xs font-mono bg-amber-500/10 border border-amber-500/30 text-amber-300"></div>
            </div>

            <hr class="border-slate-800">

            <!-- Sección 3: Desglose Contable (Solo Lectura) -->
            <div>
                <h2 class="text-sm font-semibold text-amber-400 uppercase tracking-wider mb-4">3. Desglose Impuestos y Total</h2>
                <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 grid grid-cols-2 md:grid-cols-5 gap-3 text-center">
                    <div>
                        <span class="block text-[10px] text-slate-500 uppercase">Precio Unit. Bruto</span>
                        <span id="lblPrecioUnit" class="text-sm font-bold text-slate-300">$0</span>
                    </div>
                    <div>
                        <span class="block text-[10px] text-slate-500 uppercase">Neto</span>
                        <span id="lblNeto" class="text-sm font-bold text-slate-300">$0</span>
                    </div>
                    <div>
                        <span class="block text-[10px] text-slate-500 uppercase">ILA (28%)</span>
                        <span id="lblILA" class="text-sm font-bold text-amber-400">$0</span>
                    </div>
                    <div>
                        <span class="block text-[10px] text-slate-500 uppercase">IVA (19%)</span>
                        <span id="lblIVA" class="text-sm font-bold text-slate-300">$0</span>
                    </div>
                    <div class="col-span-2 md:col-span-1 bg-amber-500/10 rounded-lg p-1 border border-amber-500/20">
                        <span class="block text-[10px] text-amber-400 uppercase font-bold">Total Bruto</span>
                        <span id="lblTotal" class="text-lg font-black text-amber-400">$0</span>
                    </div>
                </div>
            </div>

            <!-- Botón Acción -->
            <button onclick="generarPedido()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3 rounded-xl transition duration-200">
                🚀 Generar Orden de Trabajo y Descuenta Cava
            </button>
        </div>
    </div>

    <script>
        // Configuración Firebase (Reemplaza con tus llaves si aplica)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROJECT.firebaseapp.com",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_PROJECT.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cavaProductos = [];
        let loteRecomendadoFIFO = "";

        // Cargar inventario de Cava al iniciar
        window.addEventListener('DOMContentLoaded', cargarCava);

        function cargarCava() {
            db.collection('inventariochuyma').get().then(snapshot => {
                cavaProductos = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.stock > 0) {
                        cavaProductos.push({ id: doc.id, ...data });
                    }
                });

                // Ordenar por FIFO (Fecha de ingreso más antigua primero)
                cavaProductos.sort((a, b) => {
                    const fechaA = a.fechaIngreso ? a.fechaIngreso.toDate() : new Date(0);
                    const fechaB = b.fechaIngreso ? b.fechaIngreso.toDate() : new Date(0);
                    return fechaA - fechaB;
                });

                if (cavaProductos.length > 0) {
                    loteRecomendadoFIFO = cavaProductos[0].idLoteBrewfather || cavaProductos[0].id;
                }

                poblarSelectCava();
            });
        }

        function poblarSelectCava() {
            const select = document.getElementById('selectCava');
            select.innerHTML = '<option value="">-- Seleccionar Lote de Cava --</option>';

            cavaProductos.forEach(p => {
                const isFIFO = (p.idLoteBrewfather || p.id) === loteRecomendadoFIFO;
                const tagFIFO = isFIFO ? " ⭐ [RECOMENDADO FIFO]" : "";
                select.innerHTML += `<option value="${p.id}" data-precio="${p.precioBrutoUnitario}" data-stock="${p.stock}" data-lote="${p.idLoteBrewfather || p.id}">
                    ${p.nombreProducto} | Lote: ${p.idLoteBrewfather || p.id} | Stock: ${p.stock} u. | $${p.precioBrutoUnitario}${tagFIFO}
                </option>`;
            });
        }

        function actualizarDetallesLote() {
            const select = document.getElementById('selectCava');
            const selectedOption = select.options[select.selectedIndex];
            const alerta = document.getElementById('alertaFIFO');

            if (!selectedOption.value) {
                alerta.classList.add('hidden');
                return;
            }

            const loteSeleccionado = selectedOption.getAttribute('data-lote');
            if (loteSeleccionado !== loteRecomendadoFIFO) {
                alerta.innerHTML = `⚠️ <b>Atención FIFO:</b> Estás seleccionando el lote <b>${loteSeleccionado}</b>, pero el lote más antiguo en cava es <b>${loteRecomendadoFIFO}</b>.`;
                alerta.classList.remove('hidden');
            } else {
                alerta.innerHTML = `✅ <b>Cumple FIFO:</b> Estás despachando el lote más antiguo (<b>${loteSeleccionado}</b>).`;
                alerta.classList.remove('hidden');
            }

            calcularTotal();
        }

        function calcularTotal() {
            const select = document.getElementById('selectCava');
            const selectedOption = select.options[select.selectedIndex];
            const cant = parseInt(document.getElementById('cantidad').value) || 0;

            if (!selectedOption || !selectedOption.value || cant <= 0) {
                document.getElementById('lblPrecioUnit').innerText = "$0";
                document.getElementById('lblNeto').innerText = "$0";
                document.getElementById('lblILA').innerText = "$0";
                document.getElementById('lblIVA').innerText = "$0";
                document.getElementById('lblTotal').innerText = "$0";
                return;
            }

            const precioBrutoUnit = parseFloat(selectedOption.getAttribute('data-precio')) || 0;
            const totalBruto = precioBrutoUnit * cant;

            // Factor de desglose contable (Neto * 1.47 = Bruto)
            const neto = totalBruto / 1.47;
            const ila = neto * 0.28;
            const iva = neto * 0.19;

            document.getElementById('lblPrecioUnit').innerText = `$${precioBrutoUnit.toLocaleString('es-CL')}`;
            document.getElementById('lblNeto').innerText = `$${Math.round(neto).toLocaleString('es-CL')}`;
            document.getElementById('lblILA').innerText = `$${Math.round(ila).toLocaleString('es-CL')}`;
            document.getElementById('lblIVA').innerText = `$${Math.round(iva).toLocaleString('es-CL')}`;
            document.getElementById('lblTotal').innerText = `$${Math.round(totalBruto).toLocaleString('es-CL')}`;
        }

        function generarPedido() {
            const cliente = document.getElementById('cliente').value.trim();
            const rut = document.getElementById('rutCliente').value.trim();
            const direccion = document.getElementById('direccionDespacho').value.trim();
            const formaPago = document.getElementById('formaPago').value;
            const select = document.getElementById('selectCava');
            const selectedOption = select.options[select.selectedIndex];
            const cant = parseInt(document.getElementById('cantidad').value) || 0;

            if (!cliente || !rut || !direccion || !selectedOption.value || cant <= 0) {
                alert("Por favor completa todos los campos obligatorios.");
                return;
            }

            const stockDisponible = parseInt(selectedOption.getAttribute('data-stock'));
            if (cant > stockDisponible) {
                alert(`Stock insuficiente. Solo hay ${stockDisponible} unidades disponibles.`);
                return;
            }

            const idCava = selectedOption.value;
            const loteBrewfather = selectedOption.getAttribute('data-lote'); // MATCH DE TRAZABILIDAD
            const precioBrutoUnit = parseFloat(selectedOption.getAttribute('data-precio'));
            const totalBruto = precioBrutoUnit * cant;
            const neto = totalBruto / 1.47;
            const idOT = "OT-" + Date.now().toString().slice(-6);

            // Transacción en Firestore para asegurar consistencia
            db.runTransaction(transaction => {
                const cavaRef = db.collection('inventariochuyma').doc(idCava);
                
                return transaction.get(cavaRef).then(cavaDoc => {
                    if (!cavaDoc.exists) throw "El producto ya no existe en la cava.";
                    
                    const nuevoStock = cavaDoc.data().stock - cant;
                    if (nuevoStock < 0) throw "Stock insuficiente en tiempo real.";

                    // 1. Descontar stock de Cava
                    transaction.update(cavaRef, { stock: nuevoStock });

                    // 2. Guardar Orden de Trabajo con MATCH DE TRAZABILIDAD
                    const otRef = db.collection('pedidos_y_lotes').doc();
                    transaction.set(otRef, {
                        codigoOT: idOT,
                        cliente: cliente,
                        rutCliente: rut,
                        direccionDespacho: direccion,
                        formaPago: formaPago,
                        loteCerveza: loteBrewfather, // <--- MATCH CON BREWFATHER
                        cantidad: cant,
                        precioBrutoUnitario: precioBrutoUnit,
                        subtotalNeto: Math.round(neto),
                        ila: Math.round(neto * 0.28),
                        iva: Math.round(neto * 0.19),
                        totalBruto: Math.round(totalBruto),
                        cumpleFIFO: (loteBrewfather === loteRecomendadoFIFO),
                        fechaEmision: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
            }).then(() => {
                alert(`¡Orden de Trabajo ${idOT} generada con éxito!\nStock actualizado en Cava.`);
                location.reload();
            }).catch(err => {
                alert("Error al procesar el pedido: " + err);
            });
        }
    </script>
</body>
</html>
